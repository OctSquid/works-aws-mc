name: terraform

on:
  pull_request:
    # server.json: Terraform が ec2.instance_types / ec2.architecture を直接読むため
    paths: ["terraform/**", "lambda/**", "server.json", ".github/workflows/terraform.yml"]
  push:
    branches: [main]
    paths: ["terraform/**", "lambda/**", "server.json", ".github/workflows/terraform.yml"]

permissions:
  id-token: write # OIDC
  contents: read
  pull-requests: write # plan コメント用

env:
  AWS_REGION: ap-northeast-1
  TF_DIR: terraform/envs/prod

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: lambda/package-lock.json

      # Lambda は terraform apply が archive_file で zip 化するため、apply 前にビルドしておく
      - name: Build lambda
        working-directory: lambda
        run: |
          npm ci
          npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/gha-terraform
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.12"

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=envs/prod/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform plan
        id: plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          set -o pipefail
          terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan.txt

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_DIR }}/plan.txt', 'utf8');
            const body = `### Terraform plan\n\n\`\`\`\n${plan.slice(-60000)}\n\`\`\``;
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Terraform apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -input=false -auto-approve tfplan
