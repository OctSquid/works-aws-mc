name: ami-build

on:
  push:
    branches: [main]
    paths:
      # tools/download-artifacts/** は含めない（ダウンローダ自体の変更は lambda-ci で
      # 検証され、出力が変わるときは server.json / plugins.json も変わるため）
      - server.json
      - plugins.json
      - "server/**"
      - "packer/**"
      - "!packer/base/**" # ベース AMI は ami-base-build.yml が担当
      - .github/workflows/ami-build.yml
  workflow_dispatch:
    inputs:
      force_download:
        description: "jar キャッシュを無視して再ダウンロードする（version: latest の追従用）"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1
  AMI_KEEP_GENERATIONS: 2

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # server.json / plugins.json が変わらない限り jar 一式を再利用する。
      # "latest" 指定の追従が必要なときは workflow_dispatch の force_download を使う
      - name: Cache downloaded artifacts
        id: cache-artifacts
        uses: actions/cache@v5
        with:
          path: artifacts
          key: artifacts-${{ hashFiles('server.json', 'plugins.json') }}

      - uses: actions/setup-node@v6
        if: steps.cache-artifacts.outputs.cache-hit != 'true' || inputs.force_download
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Download Paper + plugins
        if: steps.cache-artifacts.outputs.cache-hit != 'true' || inputs.force_download
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
        run: |
          npm ci
          npm run download -w download-artifacts

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/gha-packer
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-packer@v3
        with:
          version: "1.12.0"

      - name: Packer build
        working-directory: packer
        run: |
          packer init .
          packer validate .
          packer build .

      - name: Update SSM /mc/ami-id
        working-directory: packer
        run: |
          AMI_ID=$(jq -r '.builds[-1].artifact_id' packer-manifest.json | cut -d: -f2)
          echo "New AMI: $AMI_ID"
          aws ssm put-parameter --name /mc/ami-id --type String --data-type aws:ec2:image --overwrite --value "$AMI_ID"

      - name: Deregister old AMIs (keep newest ${{ env.AMI_KEEP_GENERATIONS }})
        run: |
          OLD_AMIS=$(aws ec2 describe-images --owners self \
            --filters "Name=name,Values=mc-server-*" \
            --query 'sort_by(Images,&CreationDate)[:-'"$AMI_KEEP_GENERATIONS"'].[ImageId]' --output text)
          for ami in $OLD_AMIS; do
            echo "Deregistering $ami"
            SNAPSHOTS=$(aws ec2 describe-images --image-ids "$ami" \
              --query 'Images[0].BlockDeviceMappings[].Ebs.SnapshotId' --output text)
            aws ec2 deregister-image --image-id "$ami"
            for snap in $SNAPSHOTS; do
              aws ec2 delete-snapshot --snapshot-id "$snap"
            done
          done
