name: ami-base-build

# ベース AMI（mc-base-*: AL2023 minimal + Java / SSM Agent / awscli / rcon-cli）。
# dnf トランザクションが重いため日常の ami-build から分離し、
# OS レイヤの変更時・月次（セキュリティ更新の取り込み）のみ再ビルドする。
on:
  push:
    branches: [main]
    paths:
      - "packer/base/**"
      - .github/workflows/ami-base-build.yml
  schedule:
    - cron: "0 18 1 * *" # 毎月1日 18:00 UTC（JST 翌 3:00）に OS 更新を取り込む
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1
  BASE_AMI_KEEP_GENERATIONS: 1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/gha-packer
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-packer@v3
        with:
          version: "1.12.0"

      - name: Packer build (base)
        working-directory: packer/base
        run: |
          packer init .
          packer validate .
          packer build .

      - name: Deregister old base AMIs (keep newest ${{ env.BASE_AMI_KEEP_GENERATIONS }})
        run: |
          OLD_AMIS=$(aws ec2 describe-images --owners self \
            --filters "Name=name,Values=mc-base-*" \
            --query 'sort_by(Images,&CreationDate)[:-'"$BASE_AMI_KEEP_GENERATIONS"'].[ImageId]' --output text)
          for ami in $OLD_AMIS; do
            echo "Deregistering $ami"
            SNAPSHOTS=$(aws ec2 describe-images --image-ids "$ami" \
              --query 'Images[0].BlockDeviceMappings[].Ebs.SnapshotId' --output text)
            aws ec2 deregister-image --image-id "$ami"
            for snap in $SNAPSHOTS; do
              aws ec2 delete-snapshot --snapshot-id "$snap"
            done
          done
