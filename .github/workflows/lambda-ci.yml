name: lambda-ci

on:
  pull_request:
    paths:
      - "lambda/**"
      - "tools/**"
      - package.json
      - package-lock.json
      - tsconfig.base.json
      - .github/workflows/lambda-ci.yml

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Typecheck / build / test (all workspaces)
        run: |
          npm ci
          npm run typecheck
          npm run build
          npm test
