name: discord-commands

on:
  push:
    branches: [main]
    paths:
      - tools/register-commands/src/commands.json
      - .github/workflows/discord-commands.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Register slash commands
        env:
          DISCORD_APPLICATION_ID: ${{ vars.DISCORD_APPLICATION_ID }}
          DISCORD_GUILD_ID: ${{ vars.DISCORD_GUILD_ID }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: |
          npm ci
          npm run register -w register-commands
