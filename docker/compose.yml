# ディレクトリ名 (docker) がプロジェクト名になると他プロジェクトと衝突するため明示
name: aws-mc-server

services:
  minecraft:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        # server.json の tooling.rcon_cli_version が単一ソース。
        # mise run docker:up が jq で抽出して環境変数に渡す
        RCON_CLI_VERSION: ${RCON_CLI_VERSION:-1.6.11}
    ports:
      - "25565:25565/tcp" # Java 版
      - "19132:19132/udp" # Bedrock 版 (Geyser)
    environment:
      RCON_PASSWORD: local-dev-password
      HEAP_MB_OVERRIDE: 2048 # ローカルは小さめのヒープで起動（本番は server.json の値）
      # ローカルでも Discord 通知を試す場合は設定する
      # DISCORD_WEBHOOK_URL: https://discord.com/api/webhooks/...
    volumes:
      - ./data:/srv/minecraft # EBS データボリューム相当。消さない限りワールドが残る
    stdin_open: true
    tty: true
